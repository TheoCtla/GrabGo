services:
  postgres:
    image: postgres:16-alpine
    container_name: grabgo-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grabgo}
      POSTGRES_USER: ${POSTGRES_USER:-grabgo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grabgo_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-grabgo} -d ${POSTGRES_DB:-grabgo}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: grabgo-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DATABASE_URL: postgresql://${POSTGRES_USER:-grabgo}:${POSTGRES_PASSWORD:-grabgo_password}@postgres:5432/${POSTGRES_DB:-grabgo}?schema=public
      JWT_SECRET: ${JWT_SECRET:-replace_me_with_a_long_random_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}

volumes:
  postgres_data:
